<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> 短距離計時 (專業版 V11)</title>
    <style>
        /* 基礎設定，防止畫面整體被滑動 */
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; touch-action: manipulation; }
        
        /* 頂端設定區 */
        #top-settings { position: absolute; top: 0; left: 0; width: 100%; padding: 10px; box-sizing: border-box; background: rgba(0,0,0,0.8); z-index: 20; display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        
        #file-name-input { padding: 8px; font-size: 1rem; border-radius: 5px; border: 1px solid #555; background: #222; color: white; width: 50%; }
        #camera-select { padding: 8px; font-size: 1rem; border-radius: 5px; max-width: 45%; background: #333; color: white; border: 1px solid #555; }
        
        /* 跑道選擇區 */
        #lane-selection { display: flex; justify-content: space-between; gap: 4px; flex-wrap: nowrap; width: 100%; }
        .lane-toggle { padding: 8px 0; font-size: 0.95rem; border-radius: 5px; background: #444; border: 1px solid #777; color: white; flex: 1; text-align: center; white-space: nowrap; transition: background 0.2s;}
        .lane-toggle.active { background: #007AFF; border-color: #0056b3; font-weight: bold; }
        #select-all-btn { padding: 8px; background: #555; color: white; border: none; border-radius: 5px; width: 100%; font-size: 1rem; font-weight: bold; margin-top: 2px;}

        /* 錄影燈 */
        #recording-indicator { position: absolute; top: 150px; left: 20px; color: #FF3B30; font-weight: bold; font-size: 1rem; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; display: none; z-index: 30; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }

        #camera-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* 操作按鈕 */
        #ready-btn { position: absolute; top: 50%; padding: 15px 30px; font-size: 1.5rem; font-weight: bold; border-radius: 10px; border: 2px solid white; background: #FF9500; color: white; z-index: 40; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* 錄影控制列 (上移並修改為底部對齊) */
        #recording-controls { position: absolute; bottom: 15%; right: 30px; display: none; align-items: flex-end; gap: 15px; z-index: 40; }
        #cancel-btn { padding: 10px 20px; font-size: 1.2rem; font-weight: bold; border-radius: 12px; border: 2px solid white; background: #888; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); line-height: 1.4; }
        #start-btn { padding: 35px 55px; font-size: 3rem; font-weight: bold; border-radius: 20px; border: 4px solid white; background: #34C759; color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }

        /* 結束鍵同步上移 */
        #stop-record-btn { position: absolute; bottom: 15%; padding: 15px 30px; font-size: 1.3rem; font-weight: bold; border-radius: 10px; border: none; background: #FF3B30; color: white; display: none; z-index: 40; }

        #timer-display { position: absolute; top: 150px; right: 20px; font-size: 3.5rem; font-family: 'Courier New', monospace; color: #FFD700; text-shadow: 2px 2px 4px #000; display: none; z-index: 10; font-weight: bold; }

        /* ★ 佈局大升級：嚴格鎖死外框，不允許整體滑動 ★ */
        #playback-container { 
            display: none; position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100dvh; 
            background: #111; flex-direction: column; z-index: 50; 
            overflow: hidden; 
        }
        
        /* 影片區：絕對鎖死高度，禁止縮放 */
        #playback-video-wrapper { 
            width: 100%; height: 40vh; flex: 0 0 40vh; 
            background: #000; display: flex; justify-content: center; align-items: center; 
            overflow: hidden; touch-action: none; position: relative;
        }
        #playback-video { width: 100%; height: 100%; object-fit: contain; transform-origin: center center; transition: transform 0.05s linear; }
        
        #playback-timer-overlay { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 2.5rem; font-family: 'Courier New', monospace; color: #FFD700; text-shadow: 2px 2px 6px #000; z-index: 65; font-weight: bold; pointer-events: none; }
        #play-pause-overlay { position: absolute; font-size: 4rem; color: rgba(255,255,255,0.6); display: none; pointer-events: none; z-index: 60; }
        
        /* 控制面板：鎖死高度，不允許縮放 */
        .playback-controls { 
            width: 95%; margin: 5px auto; text-align: center; 
            flex: 0 0 auto; 
        }
        #playback-hint { font-size: 0.85rem; color: #aaa; text-align: center; margin-top: 5px; }
        
        .slider-row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; gap: 5px; }
        #seek-bar { flex: 1; height: 25px; margin: 0 5px; }
        .btn-step { background: #555; color: white; border: 1px solid #777; border-radius: 6px; padding: 8px 12px; font-size: 0.95rem; font-weight: bold; white-space: nowrap; }
        
        .btn-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; align-items: center; }
        .btn-blue { background: #007AFF; font-size: 0.9rem; padding: 8px 10px; border-radius: 8px; border: none; color: white; }
        .btn-rev { background: #E64A19; } 
        #current-speed-label { color: #34C759; font-weight: bold; font-size: 0.95rem; margin-left: 5px; }

        /* ★ 新增：左側滾動滑桿容器 ★ */
        #bottom-scroll-area {
            flex: 1 1 0; /* 吸收下方所有剩餘空間 */
            overflow-y: auto; /* 啟動垂直滾動 */
            direction: rtl; /* 【黑科技】將滾動條強制移到左側 */
            width: 100%;
            margin-top: 5px;
        }

        /* 判定區被包裹在滾動容器內，自然長高 */
        #judge-area { 
            direction: ltr; /* 將內部內容方向翻轉回正常的左到右 */
            width: 95%; margin: 0 auto 30px auto; 
            background: #222; padding: 10px; 
            border-radius: 8px; box-sizing: border-box; 
            display: flex; flex-direction: column; 
            height: auto; /* 解除高度限制，讓表格撐開 */
        }
        
        #judge-title { font-size: 1rem; color: #FFD700; margin-bottom: 5px; text-align: center; }
        #playback-lane-btns { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .judge-lane-btn { padding: 10px; font-size: 1.1rem; border-radius: 8px; background: #FF9500; color: white; border: none; font-weight: bold; flex: 1; text-align: center; min-width: 60px; }
        .judge-lane-btn.recorded { background: #34C759; }

        /* 表格容器不再有內部滾動，與判斷區一起滑動 */
        .table-container { 
            margin-bottom: 15px; border: 1px solid #555; border-radius: 5px; background: #111; 
            overflow: visible; 
        }
        table { width: 100%; border-collapse: collapse; text-align: center; color: white; }
        th, td { border: 1px solid #444; padding: 8px; }
        /* 表頭依然會黏在上面，方便對照 */
        th { background: #333; position: sticky; top: 0; z-index: 2; box-shadow: 0 2px 2px -1px rgba(0,0,0,0.5); }
        
        /* 匯出按鈕列：跟著表格在最底下 */
        .export-row { display: flex; justify-content: space-around; gap: 10px; margin-top: 10px;}
        .btn-export { background: #AF52DE; font-size: 1.1rem; padding: 10px; border-radius: 8px; border: none; color: white; flex: 1; font-weight: bold; transition: background 0.3s;}
        .btn-export.video { background: #FF2D55; }
        .btn-export:disabled { background: #555; color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="camera-container">
        <div id="top-settings">
            <div class="row">
                <input type="text" id="file-name-input" placeholder="輸入檔名(例: 101班第1組)">
                <select id="camera-select"></select>
            </div>
            <div style="font-size: 0.9rem; color: #ccc;">點選本組參賽跑道：</div>
            <div id="lane-selection">
                <div class="lane-toggle active" data-lane="1">道 1</div>
                <div class="lane-toggle active" data-lane="2">道 2</div>
                <div class="lane-toggle active" data-lane="3">道 3</div>
                <div class="lane-toggle active" data-lane="4">道 4</div>
                <div class="lane-toggle active" data-lane="5">道 5</div>
                <div class="lane-toggle active" data-lane="6">道 6</div>
                <div class="lane-toggle active" data-lane="7">道 7</div>
                <div class="lane-toggle active" data-lane="8">道 8</div>
            </div>
            <button id="select-all-btn">全選 1-8 道</button>
        </div>
        
        <div id="recording-indicator">🔴 錄影中</div>
        <video id="camera-feed" autoplay playsinline muted></video>
        
        <button id="ready-btn">預備 (開始錄影)</button>
        
        <div id="recording-controls">
            <button id="cancel-btn">回上<br>一步</button>
            <button id="start-btn">開始</button>
        </div>

        <div id="timer-display">00.000</div>
        
        <button id="stop-record-btn">結束測驗並回放</button>
    </div>

    <div id="playback-container">
        
        <div id="playback-video-wrapper">
            <div id="playback-timer-overlay">00.000</div>
            <video id="playback-video" playsinline></video>
            <div id="play-pause-overlay">▶️</div>
        </div>
        
        <div class="playback-controls">
            <div id="playback-hint">點擊螢幕暫停 雙指撥動放大</div>
            <div class="slider-row">
                <button class="btn-step" id="step-back-btn">⏪ 退一格</button>
                <input type="range" id="seek-bar" value="0" step="0.01">
                <button class="btn-step" id="step-forward-btn">進一格 ⏩</button>
            </div>
            <div class="btn-row">
                <button class="btn-blue btn-rev" id="rev-slow-01-btn">-0.1x 倒帶看</button>
                <button class="btn-blue" id="slow-01-btn">0.1x 極慢</button>
                <button class="btn-blue" id="slow-25-btn">0.25x 慢</button>
                <button class="btn-blue" id="normal-btn">1.0x 正常</button>
                <button class="btn-blue" style="background:#555;" id="restart-btn">重新測驗</button>
                <span id="current-speed-label">速度: 1.0x</span>
            </div>
        </div>

        <div id="bottom-scroll-area">
            <div id="judge-area">
                <div id="judge-title">請在選手壓線瞬間，點擊對應跑道紀錄成績</div>
                <div id="playback-lane-btns"></div> 
                
                <div class="table-container">
                    <table id="results-table">
                        <thead>
                            <tr><th>名次</th><th>跑道</th><th>成績 (秒)</th></tr>
                        </thead>
                        <tbody id="results-tbody"></tbody>
                    </table>
                </div>

                <div class="export-row">
                    <button class="btn-export" id="export-excel-btn">📊 下載成績單</button>
                    <button class="btn-export video" id="export-video-btn">🎬 製作影片檔</button>
                </div>
            </div>
        </div>

    </div>

<script>
    const cameraFeed = document.getElementById('camera-feed');
    const cameraSelect = document.getElementById('camera-select');
    const fileNameInput = document.getElementById('file-name-input');
    const topSettings = document.getElementById('top-settings');
    const readyBtn = document.getElementById('ready-btn');
    const recordingControls = document.getElementById('recording-controls');
    const startBtn = document.getElementById('start-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const stopRecordBtn = document.getElementById('stop-record-btn');
    const timerDisplay = document.getElementById('timer-display');
    const recordingIndicator = document.getElementById('recording-indicator');
    
    const playbackContainer = document.getElementById('playback-container');
    const playbackVideo = document.getElementById('playback-video');
    const playbackTimerOverlay = document.getElementById('playback-timer-overlay');
    const currentSpeedLabel = document.getElementById('current-speed-label');
    const seekBar = document.getElementById('seek-bar');
    const playPauseOverlay = document.getElementById('play-pause-overlay');
    const playbackLaneBtns = document.getElementById('playback-lane-btns');
    const resultsTbody = document.getElementById('results-tbody');

    let currentStream, mediaRecorder, recordedChunks = [];
    let isRecording = false;
    let videoRecordStartTime = 0, raceStartTime = 0;
    let selectedLanes = [];
    let raceResults = []; 
    
    let isRenderTriggered = false;
    let isRendering = false;
    let finishedRenderBlob = null;

    async function initCamera(deviceId = null) {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        const constraints = { video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "environment" }, audio: false };
        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            cameraFeed.srcObject = currentStream;
            if (!deviceId) await populateCameras();
        } catch (e) { alert("相機啟動失敗: " + e); }
    }

    async function populateCameras() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        cameraSelect.innerHTML = '';
        devices.filter(d => d.kind === 'videoinput').forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.text = d.label || `鏡頭 ${i+1}`;
            cameraSelect.appendChild(opt);
        });
    }
    cameraSelect.onchange = (e) => initCamera(e.target.value);

    function updateLaneUI(btn) {
        if (btn.classList.contains('active')) {
            btn.innerText = `道 ${btn.getAttribute('data-lane')}`;
        } else {
            btn.innerText = '空';
        }
    }

    document.querySelectorAll('.lane-toggle').forEach(btn => {
        btn.onclick = () => { btn.classList.toggle('active'); updateLaneUI(btn); };
    });

    document.getElementById('select-all-btn').onclick = () => {
        document.querySelectorAll('.lane-toggle').forEach(btn => { btn.classList.add('active'); updateLaneUI(btn); });
    };

    readyBtn.onclick = () => {
        selectedLanes = [];
        document.querySelectorAll('.lane-toggle.active').forEach(btn => { selectedLanes.push(btn.getAttribute('data-lane')); });
        if (selectedLanes.length === 0) { alert("請至少選擇一個參賽跑道！"); return; }

        recordedChunks = [];
        isRenderTriggered = false;
        isRendering = false;
        finishedRenderBlob = null;
        document.getElementById('export-video-btn').innerText = "🎬 製作影片檔";
        document.getElementById('export-video-btn').style.background = "#FF2D55";

        try { mediaRecorder = new MediaRecorder(currentStream, { mimeType: 'video/webm' }); } 
        catch (e) { mediaRecorder = new MediaRecorder(currentStream); }
        
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = showPlayback;
        mediaRecorder.start();
        
        isRecording = true;
        videoRecordStartTime = performance.now(); 
        
        topSettings.style.display = 'none';
        readyBtn.style.display = 'none';
        recordingIndicator.style.display = 'block';
        recordingControls.style.display = 'flex'; 
    };

    cancelBtn.onclick = () => {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.onstop = null; mediaRecorder.stop(); }
        isRecording = false; recordedChunks = [];
        recordingControls.style.display = 'none'; recordingIndicator.style.display = 'none';
        topSettings.style.display = 'flex'; readyBtn.style.display = 'block';
    };

    startBtn.onclick = () => {
        raceStartTime = performance.now();
        recordingControls.style.display = 'none';
        stopRecordBtn.style.display = 'block';
        timerDisplay.style.display = 'block';
        updateTimer();
    };

    function updateTimer() {
        if (!isRecording) return;
        let ms = performance.now() - raceStartTime;
        timerDisplay.innerText = (ms/1000).toFixed(3).padStart(6, '0');
        requestAnimationFrame(updateTimer);
    }

    stopRecordBtn.onclick = () => {
        isRecording = false;
        recordingIndicator.style.display = 'none';
        if (mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    };

    function showPlayback() {
        document.getElementById('camera-container').style.display = 'none';
        playbackContainer.style.display = 'flex';
        
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        playbackVideo.src = URL.createObjectURL(blob);
        playbackVideo.playbackRate = 1.0;
        currentSpeedLabel.innerText = "速度: 1.0x";

        playbackLaneBtns.innerHTML = '';
        raceResults = [];
        renderResultsTable();

        selectedLanes.forEach(lane => {
            let btn = document.createElement('button');
            btn.className = 'judge-lane-btn';
            btn.innerText = `道 ${lane}`;
            btn.onclick = () => recordTimeForLane(lane, btn);
            playbackLaneBtns.appendChild(btn);
        });

        requestAnimationFrame(updatePlaybackOverlayTimer);
    }

    function updatePlaybackOverlayTimer() {
        if(playbackContainer.style.display === 'flex') {
            let raceStartOffset = (raceStartTime - videoRecordStartTime) / 1000;
            let displayTime = playbackVideo.currentTime - raceStartOffset;
            if (displayTime < 0) displayTime = 0;
            playbackTimerOverlay.innerText = displayTime.toFixed(3).padStart(6, '0');
            requestAnimationFrame(updatePlaybackOverlayTimer);
        }
    }

    function recordTimeForLane(lane, btnElement) {
        let raceStartOffset = (raceStartTime - videoRecordStartTime) / 1000;
        let timeInSeconds = playbackVideo.currentTime - raceStartOffset;
        if (timeInSeconds < 0) timeInSeconds = 0;
        
        let existing = raceResults.find(r => r.lane === lane);
        if (existing) { existing.time = timeInSeconds; } 
        else { raceResults.push({ lane: lane, time: timeInSeconds }); }
        
        btnElement.classList.add('recorded');
        renderResultsTable();

        if (raceResults.length === selectedLanes.length && !isRenderTriggered) {
            startVideoRender();
        }
    }

    function renderResultsTable() {
        raceResults.sort((a, b) => a.time - b.time);
        resultsTbody.innerHTML = '';
        if (raceResults.length === 0) {
            resultsTbody.innerHTML = `<tr><td colspan="3">尚未標記成績</td></tr>`;
            return;
        }
        raceResults.forEach((result, index) => {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td>${index + 1}</td><td>第 ${result.lane} 道</td><td style="font-family: monospace; font-size:1.1rem;">${result.time.toFixed(3)}</td>`;
            resultsTbody.appendChild(tr);
        });
        
        // 確保新增成績時，左側滑動容器會自動滾到最底下
        const scrollArea = document.getElementById('bottom-scroll-area');
        if (scrollArea) {
            setTimeout(() => { scrollArea.scrollTop = scrollArea.scrollHeight; }, 50);
        }
    }

    // ★ 倒帶與微調邏輯 ★
    let isReversing = false;

    playbackVideo.onloadedmetadata = () => { seekBar.max = playbackVideo.duration; };
    playbackVideo.ontimeupdate = () => { if(!isReversing) seekBar.value = playbackVideo.currentTime; };
    
    seekBar.oninput = () => { 
        isReversing = false; 
        playbackVideo.currentTime = seekBar.value; 
    };

    playbackVideo.addEventListener('seeked', () => {
        if (!isReversing) return;
        seekBar.value = playbackVideo.currentTime;
        setTimeout(() => {
            if (isReversing && playbackVideo.currentTime > 0) {
                playbackVideo.currentTime = Math.max(0, playbackVideo.currentTime - 0.03);
            } else if (playbackVideo.currentTime <= 0) {
                isReversing = false;
                currentSpeedLabel.innerText = "速度: 暫停";
            }
        }, 80); 
    });

    function changeSpeed(rate) {
        isReversing = false; 
        if (rate < 0) {
            playbackVideo.pause();
            isReversing = true;
            currentSpeedLabel.innerText = `速度: 倒帶看`;
            playbackVideo.currentTime = Math.max(0, playbackVideo.currentTime - 0.03);
        } else {
            playbackVideo.playbackRate = rate;
            currentSpeedLabel.innerText = `速度: ${rate}x`;
            playbackVideo.play();
        }
    }

    document.getElementById('step-back-btn').onclick = () => {
        isReversing = false;
        playbackVideo.pause();
        playbackVideo.currentTime = Math.max(0, playbackVideo.currentTime - 0.01);
        currentSpeedLabel.innerText = "速度: 暫停";
    };
    
    document.getElementById('step-forward-btn').onclick = () => {
        isReversing = false;
        playbackVideo.pause();
        playbackVideo.currentTime = Math.min(playbackVideo.duration, playbackVideo.currentTime + 0.01);
        currentSpeedLabel.innerText = "速度: 暫停";
    };

    document.getElementById('rev-slow-01-btn').onclick = () => changeSpeed(-0.1);
    document.getElementById('slow-01-btn').onclick = () => changeSpeed(0.1);
    document.getElementById('slow-25-btn').onclick = () => changeSpeed(0.25);
    document.getElementById('normal-btn').onclick = () => changeSpeed(1.0);
    
    document.getElementById('restart-btn').onclick = () => { 
        if(confirm("確定要重新測驗嗎？尚未下載的成績與影片將會遺失！")) { location.reload(); }
    };

    // 雙指縮放與平移邏輯
    const videoWrapper = document.getElementById('playback-video-wrapper');
    let currentScale = 1;
    let initialDistance = 0;
    let currentTranslate = { x: 0, y: 0 };
    let startPan = { x: 0, y: 0 };
    let isPanning = false;

    videoWrapper.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            initialDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        } else if (e.touches.length === 1 && currentScale > 1) {
            isPanning = true;
            startPan.x = e.touches[0].clientX - currentTranslate.x;
            startPan.y = e.touches[0].clientY - currentTranslate.y;
        }
    });

    videoWrapper.addEventListener('touchmove', (e) => {
        if (currentScale > 1 || e.touches.length > 1) { e.preventDefault(); } 
        
        if (e.touches.length === 2) {
            let currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            let scaleChange = currentDistance / initialDistance;
            currentScale = Math.max(1, Math.min(currentScale * scaleChange, 5)); 
            initialDistance = currentDistance;
            updateTransform();
        } else if (e.touches.length === 1 && isPanning) {
            currentTranslate.x = e.touches[0].clientX - startPan.x;
            currentTranslate.y = e.touches[0].clientY - startPan.y;
            updateTransform();
        }
    }, { passive: false });

    videoWrapper.addEventListener('touchend', (e) => {
        if (e.touches.length < 2) initialDistance = 0;
        if (e.touches.length === 0) isPanning = false;
    });

    function updateTransform() {
        if (currentScale === 1) currentTranslate = { x: 0, y: 0 }; 
        playbackVideo.style.transform = `translate(${currentTranslate.x}px, ${currentTranslate.y}px) scale(${currentScale})`;
    }

    videoWrapper.onclick = (e) => {
        isReversing = false; 
        if (playbackVideo.paused) {
            playbackVideo.play();
            playPauseOverlay.style.display = 'none';
        } else {
            playbackVideo.pause();
            playPauseOverlay.innerText = "⏸️";
            playPauseOverlay.style.display = 'block';
            setTimeout(() => { playPauseOverlay.style.display = 'none'; }, 800);
        }
    };

    // 匯出邏輯
    function getFileName() {
        let name = fileNameInput.value.trim();
        return name ? name : `測驗成績_${new Date().getTime()}`;
    }

    document.getElementById('export-excel-btn').onclick = () => {
        if (raceResults.length === 0) { alert("沒有成績可匯出！"); return; }
        let csvContent = "\uFEFF"; 
        csvContent += "名次,跑道,成績(秒)\n";
        raceResults.forEach((r, i) => { csvContent += `${i + 1},${r.lane},${r.time.toFixed(3)}\n`; });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
        link.download = `${getFileName()}.csv`;
        link.click();
    };

    function startVideoRender() {
        if (recordedChunks.length === 0 || isRenderTriggered) return;
        isRenderTriggered = true;
        isRendering = true;

        const btn = document.getElementById('export-video-btn');
        btn.disabled = true;
        btn.style.background = "#555";
        btn.innerText = "⏳ 準備製作影片...";

        const renderCanvas = document.createElement('canvas');
        const renderCtx = renderCanvas.getContext('2d');
        const sourceVideo = document.createElement('video');
        
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        sourceVideo.src = URL.createObjectURL(blob);
        sourceVideo.muted = true;
        sourceVideo.playsInline = true;

        sourceVideo.onloadedmetadata = () => {
            renderCanvas.width = sourceVideo.videoWidth;
            renderCanvas.height = sourceVideo.videoHeight;
            
            let stream;
            try { stream = renderCanvas.captureStream(30); } 
            catch(e) { console.error(e); btn.innerText = "瀏覽器不支援影片製作"; return; }
            
            let exporter;
            try { exporter = new MediaRecorder(stream, { mimeType: 'video/webm' }); } 
            catch (e) { exporter = new MediaRecorder(stream); } 
            
            const exportChunks = [];
            exporter.ondataavailable = e => { if (e.data.size > 0) exportChunks.push(e.data); };
            
            exporter.onstop = () => {
                finishedRenderBlob = new Blob(exportChunks, { type: 'video/webm' });
                isRendering = false;
                btn.innerText = "📥 下載已製作的影片";
                btn.disabled = false;
                btn.style.background = "#FF2D55";
            };

            sourceVideo.onended = () => { exporter.stop(); };
            exporter.start();
            sourceVideo.play();
            
            const raceStartOffset = (raceStartTime - videoRecordStartTime) / 1000;
            const timerFontSize = Math.floor(renderCanvas.height * 0.08);
            const resultFontSize = Math.floor(renderCanvas.height * 0.05);

            function drawFrame() {
                if (sourceVideo.ended) return;
                
                let progress = Math.min(99, Math.floor((sourceVideo.currentTime / sourceVideo.duration) * 100));
                btn.innerText = `⏳ 製作中... ${progress}%`;

                renderCtx.drawImage(sourceVideo, 0, 0, renderCanvas.width, renderCanvas.height);
                
                let displayTime = sourceVideo.currentTime - raceStartOffset;
                if (displayTime < 0) displayTime = 0;

                const centerX = renderCanvas.width / 2;
                let timerY = timerFontSize * 1.5;

                const timeText = displayTime.toFixed(3).padStart(6, '0');
                renderCtx.textAlign = 'center';
                renderCtx.font = `bold ${timerFontSize}px monospace`;
                renderCtx.lineWidth = timerFontSize * 0.1;
                renderCtx.strokeStyle = 'black'; 
                renderCtx.strokeText(timeText, centerX, timerY);
                renderCtx.fillStyle = '#FFD700';
                renderCtx.fillText(timeText, centerX, timerY);

                let shownResults = raceResults.filter(r => r.time <= displayTime);
                shownResults.sort((a, b) => a.time - b.time);
                
                renderCtx.font = `bold ${resultFontSize}px sans-serif`;
                renderCtx.lineWidth = resultFontSize * 0.1;
                
                shownResults.forEach((res, idx) => {
                    let y = timerY + (idx + 1) * (resultFontSize * 1.5);
                    let text = `第${idx+1}名  道${res.lane}  成績: ${res.time.toFixed(3)}`;
                    
                    renderCtx.strokeStyle = 'black';
                    renderCtx.strokeText(text, centerX, y);
                    renderCtx.fillStyle = '#FFFFFF';
                    renderCtx.fillText(text, centerX, y);
                });

                if (!sourceVideo.paused) { requestAnimationFrame(drawFrame); }
            }
            sourceVideo.onplay = () => drawFrame();
        };
    }

    document.getElementById('export-video-btn').onclick = () => {
        if (finishedRenderBlob) {
            const link = document.createElement("a");
            link.href = URL.createObjectURL(finishedRenderBlob);
            link.download = `${getFileName()}_成績影片.webm`;
            link.click();
        } else if (!isRenderTriggered) {
            startVideoRender();
        }
    };

    window.onload = () => initCamera();
</script>
</body>
</html>
