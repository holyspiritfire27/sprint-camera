<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>短跑計時 Pro (精準版)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; touch-action: manipulation; }
        
        /* 頂端設定區 */
        #top-settings { position: absolute; top: 0; left: 0; width: 100%; padding: 10px; box-sizing: border-box; background: rgba(0,0,0,0.8); z-index: 20; display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        
        #file-name-input { padding: 8px; font-size: 1rem; border-radius: 5px; border: 1px solid #555; background: #222; color: white; width: 50%; }
        #camera-select { padding: 8px; font-size: 1rem; border-radius: 5px; max-width: 45%; background: #333; color: white; border: 1px solid #555; }
        
        /* 跑道選擇區 (畫面右到左 1-8) */
        #lane-selection { display: flex; justify-content: flex-end; gap: 5px; flex-wrap: wrap; }
        .lane-toggle { padding: 10px; font-size: 1.1rem; border-radius: 5px; background: #444; border: 1px solid #777; color: white; flex: 1; text-align: center; }
        .lane-toggle.active { background: #007AFF; border-color: #0056b3; font-weight: bold; }

        /* 錄影燈 */
        #recording-indicator { position: absolute; top: 120px; left: 20px; color: #FF3B30; font-weight: bold; font-size: 1rem; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; display: none; z-index: 30; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }

        #camera-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* 操作按鈕 */
        #ready-btn { position: absolute; top: 40%; padding: 15px 30px; font-size: 1.5rem; font-weight: bold; border-radius: 10px; border: 2px solid white; background: #FF9500; color: white; z-index: 40; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* 開始按鈕：右下角、超大 */
        #start-btn { position: absolute; bottom: 30px; right: 30px; padding: 40px 60px; font-size: 3rem; font-weight: bold; border-radius: 20px; border: 4px solid white; background: #34C759; color: white; z-index: 40; box-shadow: 0 8px 20px rgba(0,0,0,0.6); display: none; }

        #stop-record-btn { position: absolute; bottom: 5%; padding: 15px 30px; font-size: 1.3rem; font-weight: bold; border-radius: 10px; border: none; background: #FF3B30; color: white; display: none; z-index: 40; }

        #timer-display { position: absolute; top: 120px; right: 20px; font-size: 3.5rem; font-family: 'Courier New', monospace; color: #FFD700; text-shadow: 2px 2px 4px #000; display: none; z-index: 10; font-weight: bold; }

        /* 播放器與成績區塊 */
        #playback-container { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; flex-direction: column; z-index: 50; overflow-y: auto; padding-bottom: 20px; }
        #playback-video-wrapper { position: relative; width: 100%; background: #000; display: flex; justify-content: center; align-items: center; }
        #playback-video { width: 100%; max-height: 45vh; }
        #play-pause-overlay { position: absolute; font-size: 4rem; color: rgba(255,255,255,0.6); display: none; pointer-events: none; z-index: 60; }
        
        .playback-controls { width: 95%; margin: 10px auto; text-align: center; }
        #seek-bar { width: 100%; height: 25px; margin-bottom: 10px; }
        .btn-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; }
        .btn-blue { background: #007AFF; font-size: 0.9rem; padding: 8px 12px; border-radius: 8px; border: none; color: white; }

        /* 判定區 */
        #judge-area { width: 95%; margin: 10px auto; background: #222; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        #judge-title { font-size: 1rem; color: #FFD700; margin-bottom: 5px; text-align: center; }
        #playback-lane-btns { display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .judge-lane-btn { padding: 12px; font-size: 1.2rem; border-radius: 8px; background: #FF9500; color: white; border: none; font-weight: bold; flex: 1; text-align: center; }
        .judge-lane-btn.recorded { background: #34C759; }

        /* 成績表 */
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; color: white; text-align: center; }
        th, td { border: 1px solid #555; padding: 8px; }
        th { background: #444; }
        
        .export-row { display: flex; justify-content: space-around; gap: 10px; }
        .btn-export { background: #AF52DE; font-size: 1.1rem; padding: 12px; border-radius: 8px; border: none; color: white; flex: 1; font-weight: bold; }
        .btn-export.video { background: #FF2D55; }
    </style>
</head>
<body>

    <div id="camera-container">
        <div id="top-settings">
            <div class="row">
                <input type="text" id="file-name-input" placeholder="輸入檔名(例: 101班第1組)">
                <select id="camera-select"></select>
            </div>
            <div style="font-size: 0.9rem; color: #ccc;">點選本組參賽跑道 (畫面右至左)：</div>
            <div id="lane-selection">
                <div class="lane-toggle active" data-lane="8">道 8</div>
                <div class="lane-toggle active" data-lane="7">道 7</div>
                <div class="lane-toggle active" data-lane="6">道 6</div>
                <div class="lane-toggle active" data-lane="5">道 5</div>
                <div class="lane-toggle active" data-lane="4">道 4</div>
                <div class="lane-toggle active" data-lane="3">道 3</div>
                <div class="lane-toggle active" data-lane="2">道 2</div>
                <div class="lane-toggle active" data-lane="1">道 1</div>
            </div>
        </div>
        
        <div id="recording-indicator">🔴 錄影中</div>
        <video id="camera-feed" autoplay playsinline muted></video>
        
        <button id="ready-btn">預備 (開始錄影)</button>
        <button id="start-btn">開始</button>
        <div id="timer-display">00.000</div>
        
        <button id="stop-record-btn">結束測驗並回放</button>
    </div>

    <div id="playback-container">
        <div id="playback-video-wrapper">
            <video id="playback-video" playsinline></video>
            <div id="play-pause-overlay">▶️</div>
        </div>
        
        <div class="playback-controls">
            <input type="range" id="seek-bar" value="0" step="0.01">
            <div class="btn-row">
                <button class="btn-blue" id="slow-01-btn">0.1x 極慢</button>
                <button class="btn-blue" id="slow-25-btn">0.25x 慢速</button>
                <button class="btn-blue" id="normal-btn">1.0x 正常</button>
                <button class="btn-blue" style="background:#555;" id="restart-btn">重新測驗</button>
            </div>
        </div>

        <div id="judge-area">
            <div id="judge-title">請在選手壓線瞬間，點擊對應跑道紀錄成績</div>
            <div id="playback-lane-btns"></div> <table id="results-table">
                <thead>
                    <tr><th>名次</th><th>跑道</th><th>成績 (秒)</th></tr>
                </thead>
                <tbody id="results-tbody">
                    </tbody>
            </table>

            <div class="export-row">
                <button class="btn-export" id="export-excel-btn">📊 下載成績 (Excel/CSV)</button>
                <button class="btn-export video" id="export-video-btn">🎬 下載影片檔</button>
            </div>
        </div>
    </div>

<script>
    const cameraFeed = document.getElementById('camera-feed');
    const cameraSelect = document.getElementById('camera-select');
    const fileNameInput = document.getElementById('file-name-input');
    const topSettings = document.getElementById('top-settings');
    const readyBtn = document.getElementById('ready-btn');
    const startBtn = document.getElementById('start-btn');
    const stopRecordBtn = document.getElementById('stop-record-btn');
    const timerDisplay = document.getElementById('timer-display');
    const recordingIndicator = document.getElementById('recording-indicator');
    
    const playbackContainer = document.getElementById('playback-container');
    const playbackVideo = document.getElementById('playback-video');
    const seekBar = document.getElementById('seek-bar');
    const playPauseOverlay = document.getElementById('play-pause-overlay');
    const playbackLaneBtns = document.getElementById('playback-lane-btns');
    const resultsTbody = document.getElementById('results-tbody');

    let currentStream, mediaRecorder, recordedChunks = [];
    let isRecording = false, timerInterval;
    let videoRecordStartTime = 0, raceStartTime = 0;
    let selectedLanes = [];
    let raceResults = []; // 儲存成績 {lane, time}

    // 1. 相機初始化
    async function initCamera(deviceId = null) {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        const constraints = { video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "environment" }, audio: false };
        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            cameraFeed.srcObject = currentStream;
            if (!deviceId) await populateCameras();
        } catch (e) { alert("相機啟動失敗: " + e); }
    }

    async function populateCameras() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        cameraSelect.innerHTML = '';
        devices.filter(d => d.kind === 'videoinput').forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.text = d.label || `鏡頭 ${i+1}`;
            cameraSelect.appendChild(opt);
        });
    }
    cameraSelect.onchange = (e) => initCamera(e.target.value);

    // 2. 跑道選擇邏輯
    document.querySelectorAll('.lane-toggle').forEach(btn => {
        btn.onclick = () => { btn.classList.toggle('active'); };
    });

    // 3. 預備：開始錄影
    readyBtn.onclick = () => {
        // 蒐集選中的跑道 (確保從 8 到 1 的順序不變)
        selectedLanes = [];
        document.querySelectorAll('.lane-toggle.active').forEach(btn => {
            selectedLanes.push(btn.getAttribute('data-lane'));
        });
        
        if (selectedLanes.length === 0) {
            alert("請至少選擇一個參賽跑道！");
            return;
        }

        recordedChunks = [];
        try {
            mediaRecorder = new MediaRecorder(currentStream, { mimeType: 'video/webm' });
        } catch (e) {
            mediaRecorder = new MediaRecorder(currentStream); // fallback
        }
        
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = showPlayback;
        mediaRecorder.start();
        
        isRecording = true;
        videoRecordStartTime = performance.now(); // 記錄影片開始錄製的時間戳
        
        topSettings.style.display = 'none';
        readyBtn.style.display = 'none';
        recordingIndicator.style.display = 'block';
        startBtn.style.display = 'block'; // 顯示巨大開始按鈕
    };

    // 4. 開始：鳴槍計時
    startBtn.onclick = () => {
        raceStartTime = performance.now(); // 記錄比賽真正開始的時間戳
        startBtn.style.display = 'none';
        stopRecordBtn.style.display = 'block';
        timerDisplay.style.display = 'block';
        
        updateTimer();
    };

    function updateTimer() {
        if (!isRecording) return;
        let ms = performance.now() - raceStartTime;
        timerDisplay.innerText = (ms/1000).toFixed(3).padStart(6, '0');
        requestAnimationFrame(updateTimer);
    }

    // 5. 結束：停止並進入回放
    stopRecordBtn.onclick = () => {
        isRecording = false;
        recordingIndicator.style.display = 'none';
        if (mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    };

    // 6. 回放與判定 UI 初始化
    function showPlayback() {
        document.getElementById('camera-container').style.display = 'none';
        playbackContainer.style.display = 'flex';
        
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        playbackVideo.src = URL.createObjectURL(blob);

        // 產生判定按鈕 (根據錄影前選擇的跑道)
        playbackLaneBtns.innerHTML = '';
        raceResults = [];
        renderResultsTable();

        selectedLanes.forEach(lane => {
            let btn = document.createElement('button');
            btn.className = 'judge-lane-btn';
            btn.innerText = `道 ${lane}`;
            btn.onclick = () => recordTimeForLane(lane, btn);
            playbackLaneBtns.appendChild(btn);
        });
    }

    // 7. 紀錄成績邏輯
    function recordTimeForLane(lane, btnElement) {
        // 計算時間：影片當下時間 - (鳴槍時間與開始錄影的差距)
        let raceStartOffset = (raceStartTime - videoRecordStartTime) / 1000;
        let timeInSeconds = playbackVideo.currentTime - raceStartOffset;
        
        if (timeInSeconds < 0) timeInSeconds = 0; // 避免負數
        
        // 更新或新增成績
        let existing = raceResults.find(r => r.lane === lane);
        if (existing) {
            existing.time = timeInSeconds;
        } else {
            raceResults.push({ lane: lane, time: timeInSeconds });
        }
        
        btnElement.classList.add('recorded');
        renderResultsTable();
    }

    // 8. 渲染成績表 (自動排名)
    function renderResultsTable() {
        // 按時間由小到大排序
        raceResults.sort((a, b) => a.time - b.time);
        
        resultsTbody.innerHTML = '';
        if (raceResults.length === 0) {
            resultsTbody.innerHTML = `<tr><td colspan="3">尚未標記成績</td></tr>`;
            return;
        }

        raceResults.forEach((result, index) => {
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td>第 ${result.lane} 道</td>
                <td style="font-family: monospace; font-size:1.1rem;">${result.time.toFixed(3)}</td>
            `;
            resultsTbody.appendChild(tr);
        });
    }

    // 9. 影片播放控制器
    playbackVideo.onloadedmetadata = () => { seekBar.max = playbackVideo.duration; };
    playbackVideo.ontimeupdate = () => { seekBar.value = playbackVideo.currentTime; };
    seekBar.oninput = () => { playbackVideo.currentTime = seekBar.value; };

    document.getElementById('playback-video-wrapper').onclick = () => {
        if (playbackVideo.paused) {
            playbackVideo.play();
            playPauseOverlay.style.display = 'none';
        } else {
            playbackVideo.pause();
            playPauseOverlay.innerText = "⏸️";
            playPauseOverlay.style.display = 'block';
            setTimeout(() => { playPauseOverlay.style.display = 'none'; }, 800);
        }
    };

    document.getElementById('slow-01-btn').onclick = () => { playbackVideo.playbackRate = 0.1; playbackVideo.play(); };
    document.getElementById('slow-25-btn').onclick = () => { playbackVideo.playbackRate = 0.25; playbackVideo.play(); };
    document.getElementById('normal-btn').onclick = () => { playbackVideo.playbackRate = 1.0; playbackVideo.play(); };
    document.getElementById('restart-btn').onclick = () => { location.reload(); };

    // 10. 匯出邏輯
    function getFileName() {
        let name = fileNameInput.value.trim();
        if (!name) name = `測驗成績_${new Date().getTime()}`;
        return name;
    }

    document.getElementById('export-excel-btn').onclick = () => {
        if (raceResults.length === 0) { alert("沒有成績可匯出！"); return; }
        
        let csvContent = "\uFEFF"; // BOM 讓 Excel 支援中文
        csvContent += "名次,跑道,成績(秒)\n";
        raceResults.forEach((r, i) => {
            csvContent += `${i + 1},${r.lane},${r.time.toFixed(3)}\n`;
        });
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${getFileName()}.csv`;
        link.click();
    };

    document.getElementById('export-video-btn').onclick = () => {
        if (recordedChunks.length === 0) { alert("沒有影片可下載！"); return; }
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${getFileName()}.webm`;
        link.click();
    };

    window.onload = () => initCamera();
</script>
</body>
</html>
