<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>短跑計時 Pro V5 (遠距版)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; touch-action: none; }
        
        #top-bar { position: absolute; top: 0; left: 0; width: 100%; padding: 10px; box-sizing: border-box; background: rgba(0,0,0,0.7); z-index: 20; display: flex; justify-content: space-between; align-items: center; }
        #camera-select { padding: 8px; font-size: 1rem; border-radius: 5px; max-width: 45%; background: #333; color: white; border: 1px solid #555; }
        #status-msg { color: #00FF00; font-weight: bold; font-size: 1rem; }

        #recording-indicator { position: absolute; top: 60px; left: 20px; color: #FF3B30; font-weight: bold; font-size: 1rem; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; display: none; z-index: 30; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }

        #camera-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* 偵測框 */
        #roi-box { position: absolute; border: 3px dashed #00FF00; background: rgba(0, 255, 0, 0.15); box-sizing: border-box; z-index: 10; display: none; pointer-events: none; }

        /* 預備按鈕 */
        #ready-btn { position: absolute; padding: 12px 24px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; border: 2px solid white; background: #FF9500; color: white; z-index: 40; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; }

        #timer-display { position: absolute; top: 60px; right: 20px; font-size: 3.5rem; font-family: 'Courier New', monospace; color: #FFD700; text-shadow: 2px 2px 4px #000; display: none; z-index: 10; font-weight: bold; }

        #controls { position: absolute; bottom: 5%; width: 100%; text-align: center; z-index: 20; }
        #stop-record-btn { padding: 15px 30px; font-size: 1.3rem; font-weight: bold; border-radius: 10px; border: none; background: #FF3B30; color: white; display: none; cursor: pointer; }

        /* 播放器樣式 */
        #playback-container { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        #playback-video-wrapper { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #playback-video { width: 100%; max-height: 75vh; }
        #play-pause-overlay { position: absolute; font-size: 5rem; color: rgba(255,255,255,0.6); display: none; pointer-events: none; z-index: 60; }
        .playback-controls { width: 90%; margin-top: 15px; text-align: center; }
        #seek-bar { width: 100%; height: 25px; margin-bottom: 15px; }
        .btn-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; }
        .btn-blue { background: #007AFF; font-size: 0.9rem; padding: 10px 15px; border-radius: 8px; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="camera-container">
        <div id="top-bar">
            <select id="camera-select"></select>
            <div id="status-msg">👆 畫出偵測區</div>
        </div>
        <div id="recording-indicator">🔴 REC</div>
        <video id="camera-feed" autoplay playsinline muted></video>
        <div id="roi-box"></div>
        <button id="ready-btn">預備</button>
        <div id="timer-display">00.000</div>
        <canvas id="process-canvas" style="display:none;"></canvas>
        <div id="controls"><button id="stop-record-btn">結束測驗並回放</button></div>
    </div>

    <div id="playback-container">
        <div id="playback-video-wrapper">
            <video id="playback-video" playsinline></video>
            <div id="play-pause-overlay">▶️</div>
        </div>
        <div class="playback-controls">
            <input type="range" id="seek-bar" value="0" step="0.01">
            <div class="btn-row">
                <button class="btn-blue" id="slow-01-btn">0.1x 極慢</button>
                <button class="btn-blue" id="slow-25-btn">0.25x 慢速</button>
                <button class="btn-blue" id="normal-btn">1.0x 正常</button>
                <button class="btn-blue" style="background:#555;" id="restart-btn">重新測驗</button>
            </div>
        </div>
    </div>

<script>
    const cameraFeed = document.getElementById('camera-feed');
    const cameraSelect = document.getElementById('camera-select');
    const roiBox = document.getElementById('roi-box');
    const timerDisplay = document.getElementById('timer-display');
    const readyBtn = document.getElementById('ready-btn');
    const stopRecordBtn = document.getElementById('stop-record-btn');
    const statusMsg = document.getElementById('status-msg');
    const recordingIndicator = document.getElementById('recording-indicator');
    const processCanvas = document.getElementById('process-canvas');
    const ctx = processCanvas.getContext('2d', { willReadFrequently: true });
    const playbackVideo = document.getElementById('playback-video');
    const seekBar = document.getElementById('seek-bar');
    const playPauseOverlay = document.getElementById('play-pause-overlay');
    const cameraContainer = document.getElementById('camera-container');

    let currentStream, mediaRecorder, recordedChunks = [];
    let isDetecting = false, isRecording = false;
    let startTime, detectionStartTime, prevFrameData = null;
    let mappedX, mappedY, mappedW, mappedH;

    // 初始化相機
    async function initCamera(deviceId = null) {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        const constraints = { video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "environment" }, audio: false };
        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            cameraFeed.srcObject = currentStream;
            if (!deviceId) await populateCameras();
        } catch (e) { alert("相機啟動失敗: " + e); }
    }

    async function populateCameras() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        cameraSelect.innerHTML = '';
        devices.filter(d => d.kind === 'videoinput').forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.text = d.label || `鏡頭 ${i+1}`;
            cameraSelect.appendChild(opt);
        });
    }
    cameraSelect.onchange = (e) => initCamera(e.target.value);

    // 畫框事件 (支援觸控與滑鼠)
    let startX, startY, isDrawing = false;
    
    function startDraw(e) {
        if (isDetecting) return;
        isDrawing = true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        startX = clientX; startY = clientY;
        roiBox.style.left = startX + 'px'; roiBox.style.top = startY + 'px';
        roiBox.style.width = '0px'; roiBox.style.height = '0px';
        roiBox.style.display = 'block';
        readyBtn.style.display = 'none';
    }

    function moveDraw(e) {
        if (!isDrawing) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        roiBox.style.left = Math.min(startX, clientX) + 'px';
        roiBox.style.top = Math.min(startY, clientY) + 'px';
        roiBox.style.width = Math.abs(clientX - startX) + 'px';
        roiBox.style.height = Math.abs(clientY - startY) + 'px';
    }

    function endDraw(e) {
        if (!isDrawing) return;
        isDrawing = false;
        if (parseInt(roiBox.style.width) > 25) {
            if (!isRecording) startRecording();
            readyBtn.style.left = roiBox.style.left;
            let topPos = parseInt(roiBox.style.top) + parseInt(roiBox.style.height) + 10;
            readyBtn.style.top = (topPos > window.innerHeight - 80 ? parseInt(roiBox.style.top) - 60 : topPos) + 'px';
            readyBtn.style.display = 'block';
            statusMsg.innerText = "已錄影，請點預備";
            statusMsg.style.color = "#00FF00";
        } else { roiBox.style.display = 'none'; }
    }

    cameraContainer.addEventListener('touchstart', startDraw);
    cameraContainer.addEventListener('touchmove', moveDraw);
    cameraContainer.addEventListener('touchend', endDraw);
    cameraContainer.addEventListener('mousedown', startDraw);
    cameraContainer.addEventListener('mousemove', moveDraw);
    cameraContainer.addEventListener('mouseup', endDraw);

    // 錄影功能
    function startRecording() {
        recordedChunks = [];
        try {
            mediaRecorder = new MediaRecorder(currentStream);
        } catch (e) {
            console.error("錄影格式不支援", e);
            return;
        }
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = showPlayback;
        mediaRecorder.start();
        isRecording = true;
        recordingIndicator.style.display = 'block';
        stopRecordBtn.style.display = 'inline-block';
    }

    // 按下預備，計算座標並進入偵測
    readyBtn.onclick = (e) => {
        e.stopPropagation();
        
        const vW = cameraFeed.videoWidth, vH = cameraFeed.videoHeight;
        const eW = cameraFeed.clientWidth, eH = cameraFeed.clientHeight;
        const scale = Math.min(eW / vW, eH / vH);
        const offsetX = (eW - vW * scale) / 2, offsetY = (eH - vH * scale) / 2;
        const rect = roiBox.getBoundingClientRect();
        
        mappedX = Math.max(0, (rect.left - offsetX) / scale);
        mappedY = Math.max(0, (rect.top - offsetY) / scale);
        mappedW = Math.min(vW, rect.width / scale);
        mappedH = Math.min(vH, rect.height / scale);

        processCanvas.width = mappedW; processCanvas.height = mappedH;
        
        readyBtn.style.display = 'none';
        cameraSelect.style.display = 'none';
        
        statusMsg.innerText = "相機穩定中(手請離開)...";
        statusMsg.style.color = "#FFFF00";
        
        detectionStartTime = performance.now();
        isDetecting = true;
        prevFrameData = null;
        detectLoop(); // 呼叫全新升級的偵測循環
    };

    // ★ 核心升級：遠距微小動作偵測演算法 ★
    function detectLoop() {
        if (!isDetecting) return;
        ctx.drawImage(cameraFeed, mappedX, mappedY, mappedW, mappedH, 0, 0, mappedW, mappedH);
        const frame = ctx.getImageData(0, 0, mappedW, mappedH).data;
        const elapsed = performance.now() - detectionStartTime;

        // 前 2 秒鐘只記憶背景，絕對不觸發計時
        if (elapsed < 2000) {
            prevFrameData = frame;
            requestAnimationFrame(detectLoop);
            return;
        } else if (elapsed > 2000 && elapsed < 2100) {
             statusMsg.innerText = "🟢 遠距偵測中...等待發令";
             statusMsg.style.color = "#00FF00";
        }

        let changedPixels = 0;
        
        if (prevFrameData) {
            // 不跳著取樣，每個畫素都檢查 (i += 4)
            for (let i = 0; i < frame.length; i += 4) { 
                let brightness = (frame[i] + frame[i+1] + frame[i+2]) / 3;
                let pBrightness = (prevFrameData[i] + prevFrameData[i+1] + prevFrameData[i+2]) / 3;
                
                // 只抓取「劇烈變化」的畫素 (亮度差異 > 50 才算數)
                if (Math.abs(brightness - pBrightness) > 50) {
                    changedPixels++;
                }
            }
            
            // 只要框框內有超過 "20 個" 畫素發生劇烈變化，就觸發
            // 若在戶外測試太靈敏，可將 20 提高到 40；若抓不到白旗，可降到 10
            if (changedPixels > 10) { 
                triggerTimer(); 
                return; 
            }
        }
        
        prevFrameData = frame;
        requestAnimationFrame(detectLoop);
    }

    function triggerTimer() {
        isDetecting = false;
        roiBox.style.display = 'none'; // 觸發後才隱藏框框
        statusMsg.style.display = 'none';
        timerDisplay.style.display = 'block';
        
        startTime = performance.now();
        updateTimer();
    }

    function updateTimer() {
        if (!isRecording || isDetecting) return;
        let ms = performance.now() - startTime;
        timerDisplay.innerText = (ms/1000).toFixed(3).padStart(6, '0');
        requestAnimationFrame(updateTimer);
    }

    stopRecordBtn.onclick = () => {
        isRecording = isDetecting = false;
        recordingIndicator.style.display = 'none';
        if (mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    };

    // 回放器控制
    function showPlayback() {
        document.getElementById('camera-container').style.display = 'none';
        document.getElementById('playback-container').style.display = 'flex';
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        playbackVideo.src = URL.createObjectURL(blob);
    }

    playbackVideo.onloadedmetadata = () => { seekBar.max = playbackVideo.duration; };
    playbackVideo.ontimeupdate = () => { seekBar.value = playbackVideo.currentTime; };
    seekBar.oninput = () => { playbackVideo.currentTime = seekBar.value; };

    document.getElementById('playback-video-wrapper').onclick = () => {
        if (playbackVideo.paused) {
            playbackVideo.play();
            playPauseOverlay.style.display = 'none';
        } else {
            playbackVideo.pause();
            playPauseOverlay.innerText = "⏸️";
            playPauseOverlay.style.display = 'block';
            setTimeout(() => { playPauseOverlay.style.display = 'none'; }, 800);
        }
    };

    document.getElementById('slow-01-btn').onclick = () => { playbackVideo.playbackRate = 0.1; playbackVideo.play(); };
    document.getElementById('slow-25-btn').onclick = () => { playbackVideo.playbackRate = 0.25; playbackVideo.play(); };
    document.getElementById('normal-btn').onclick = () => { playbackVideo.playbackRate = 1.0; playbackVideo.play(); };
    document.getElementById('restart-btn').onclick = () => { location.reload(); };

    window.onload = () => initCamera();
</script>
</body>
</html>
